name: Share preview diagnostics

# Hits the share/poster endpoints on the deployed app and asserts on
# their shape. Catches regressions in:
#   - /api/version (zero-dep, must always work)
#   - /share/<title> og:image / og:title injection
#   - /api/poster/<title>.jpg proxy + image bytes
#   - schema-split movie lookup (row 1 + row 2 join)
#
# On PRs: runs against the Vercel preview deploy.
# On push to main: runs against production.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: read
  deployments: read
  statuses: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Vercel posts a preview-deploy comment on every PR (and updates
      # it as the build moves through Building → Ready). Parse the
      # preview URL out of that comment instead of relying on GitHub
      # `deployment_status` events — modern Vercel uses checks +
      # comments and the older wait-for-vercel-preview action times
      # out waiting for events that are never posted.
      - name: Wait for Vercel preview comment
        if: github.event_name == 'pull_request'
        id: preview
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const startMs = Date.now();
            const timeoutMs = 6 * 60 * 1000;
            while (Date.now() - startMs < timeoutMs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100,
              });
              const vercelComment = comments.find(
                (c) => c.user?.login === 'vercel[bot]' && /Ready/.test(c.body),
              );
              if (vercelComment) {
                const match = vercelComment.body.match(
                  /\[Preview\]\((https:\/\/[^)]+\.vercel\.app)\)/,
                );
                if (match) {
                  core.info(`Found Vercel preview: ${match[1]}`);
                  return match[1];
                }
              }
              core.info('Vercel preview comment not yet ready; retrying in 10s');
              await new Promise((r) => setTimeout(r, 10000));
            }
            core.setFailed('Vercel preview URL not found in PR comments after 6 min');

      - name: Resolve base URL
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=${{ steps.preview.outputs.result }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://familymovienight.watch" >> "$GITHUB_OUTPUT"
          fi

      - name: Run share diagnostics
        run: node scripts/share-diagnostics.mjs
        env:
          BASE_URL: ${{ steps.base.outputs.url }}
          TEST_TITLE: Bolt
