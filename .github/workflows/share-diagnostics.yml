name: Share preview diagnostics

# Hits the share/poster endpoints on the deployed app and asserts on
# their shape. Catches regressions in:
#   - /api/version (zero-dep, must always work)
#   - /share/<title> og:image / og:title injection
#   - /api/poster/<title>.jpg proxy + image bytes
#   - schema-split movie lookup (row 1 + row 2 join)
#
# Triggers:
#   - push to main: post-merge production smoke. The vitest CI in
#     tests.yml already covers per-PR feedback for the share/poster
#     logic — this workflow is the end-to-end check that the deploy
#     itself is healthy (route registration, env vars, Supabase reach,
#     poster proxy bytes).
#   - workflow_dispatch: manual trigger against production from
#     anywhere, including the GitHub mobile app.
#
# The PR-preview path was removed — Vercel Deployment Protection on
# previews returns 401 to anonymous fetches, and wiring the bypass
# secret added a fragile dependency that consistently went red. If
# you want preview diagnostics back, set VERCEL_BYPASS_SECRET in GH
# Actions secrets and re-add the pull_request trigger plus the
# preview-URL parsing step.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run share diagnostics against production
        run: node scripts/share-diagnostics.mjs
        env:
          BASE_URL: https://familymovienight.watch
          TEST_TITLE: Bolt
