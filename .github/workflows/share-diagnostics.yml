name: Share preview diagnostics

# Hits the share/poster endpoints on the deployed app and asserts on
# their shape. Catches regressions in:
#   - /api/version (zero-dep, must always work)
#   - /share/<title> og:image / og:title injection
#   - /api/poster/<title>.jpg proxy + image bytes
#   - schema-split movie lookup (row 1 + row 2 join)

on:
  # PRs would ideally run against the Vercel preview deploy, but
  # Vercel's previews are auth-protected by default on Hobby/Pro plans
  # (the preview URL returns Vercel's auth page instead of our
  # function output) — useless without a Protection Bypass token.
  # Run on push to main against production instead. Catches regressions
  # post-merge but reliably executes our real code paths.
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run share diagnostics against production
        run: node scripts/share-diagnostics.mjs
        env:
          BASE_URL: https://familymovienight.watch
          TEST_TITLE: Bolt
